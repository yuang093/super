<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#FFD93D">
  <title>🎨 Brutalist Joy Mobile — Supermarket Tracker UI Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --yellow: #FFD93D;
      --coral: #FF6B6B;
      --mint: #4ECDC4;
      --lavender: #A78BFA;
      --black: #1A1A1A;
      --white: #FFFFFF;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }
    html, body {
      font-family: "Fredoka", "Noto Sans TC", sans-serif;
      font-size: 16px;
      line-height: 1.4;
      color: var(--black);
      min-height: 100vh;
    }
    body {
      background: var(--yellow);
      padding: calc(12px + var(--safe-top)) 16px calc(96px + var(--safe-bottom)) 16px;
      position: relative;
      max-width: 480px;
      margin: 0 auto;
    }
    body::before {
      content: "";
      position: fixed; inset: 0;
      background:
        radial-gradient(circle at 15% 10%, var(--coral) 0%, transparent 8%),
        radial-gradient(circle at 85% 20%, var(--mint) 0%, transparent 10%),
        radial-gradient(circle at 50% 70%, var(--lavender) 0%, transparent 12%),
        radial-gradient(var(--black) 1.5px, transparent 1.5px);
      background-size: auto, auto, auto, 24px 24px;
      pointer-events: none;
      z-index: 0;
    }
    .container { position: relative; z-index: 1; }

    /* Hero card */
    .hero {
      background: var(--white);
      border: 4px solid var(--black);
      box-shadow: 6px 6px 0 var(--black);
      padding: 20px;
      margin-bottom: 16px;
      transform: rotate(-1deg);
    }
    .hero h1 {
      font-size: 32px; font-weight: 700; line-height: 1;
      margin-bottom: 8px;
    }
    .hero p { font-family: "Noto Sans TC", sans-serif; font-size: 14px; font-weight: 700; }
    .badge-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .badge {
      background: var(--mint); color: var(--black);
      padding: 4px 12px; border: 3px solid var(--black);
      font-weight: 700; font-size: 12px;
      transform: rotate(2deg);
    }
    .badge.coral { background: var(--coral); transform: rotate(-1deg); }
    .badge.lavender { background: var(--lavender); transform: rotate(1.5deg); }

    /* Total */
    .total-card {
      background: var(--coral);
      border: 4px solid var(--black);
      box-shadow: 6px 6px 0 var(--black);
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
      transform: rotate(0.5deg);
    }
    .total-label { font-family: "Noto Sans TC", sans-serif; font-size: 12px; font-weight: 900; letter-spacing: 0.2em; }
    .total-amount {
      font-size: 48px; font-weight: 700; line-height: 1;
      margin: 8px 0;
      text-shadow: 3px 3px 0 var(--white);
    }
    .total-sub { font-family: "Noto Sans TC", sans-serif; font-size: 12px; font-weight: 700; }

    /* Capture FAB */
    .capture-fab {
      display: flex; align-items: center; gap: 12px;
      width: 100%;
      background: var(--mint);
      color: var(--black);
      border: 4px solid var(--black);
      box-shadow: 6px 6px 0 var(--black);
      padding: 16px 20px;
      min-height: 72px;
      text-decoration: none;
      margin-bottom: 16px;
      transform: rotate(-1deg);
    }
    .capture-fab:active {
      transform: translateY(3px) translateX(3px) rotate(-1deg);
      box-shadow: 3px 3px 0 var(--black);
    }
    .capture-fab .icon {
      width: 48px; height: 48px;
      background: var(--white);
      border: 3px solid var(--black);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .capture-fab .text { flex: 1; }
    .capture-fab .t1 { font-size: 16px; font-weight: 700; }
    .capture-fab .t2 { font-size: 12px; opacity: 0.8; }

    /* Section card */
    .section {
      background: var(--white);
      border: 4px solid var(--black);
      box-shadow: 6px 6px 0 var(--black);
      padding: 16px;
      margin-bottom: 16px;
    }
    .section h2 {
      font-size: 20px; font-weight: 700;
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px;
    }
    .section-emoji { font-size: 28px; }

    /* Cart item */
    .cart-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0;
      border-bottom: 2px dashed var(--black);
      min-height: 64px;
    }
    .cart-item:last-child { border-bottom: none; }
    .cart-emoji {
      width: 48px; height: 48px;
      background: var(--mint);
      border: 3px solid var(--black);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .cart-item:nth-child(even) .cart-emoji { background: var(--coral); }
    .cart-item:nth-child(3n) .cart-emoji { background: var(--lavender); }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-family: "Noto Sans TC", sans-serif; font-size: 15px; font-weight: 900; }
    .item-qty { font-size: 12px; opacity: 0.7; }
    .item-right { display: flex; align-items: center; gap: 8px; }
    .price-sticker {
      background: var(--yellow);
      border: 3px solid var(--black);
      padding: 4px 10px;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 2px 2px 0 var(--black);
      transform: rotate(-3deg);
    }
    .item-del {
      width: 32px; height: 32px;
      background: var(--white);
      border: 2px solid var(--black);
      font-size: 16px;
      padding: 0;
    }

    /* FX grid */
    .fx-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .fx-cell {
      background: var(--lavender);
      border: 3px solid var(--black);
      padding: 12px;
      text-align: center;
    }
    .fx-cell:nth-child(even) { background: var(--mint); }
    .fx-pair { font-family: "Noto Sans TC", sans-serif; font-size: 12px; font-weight: 900; }
    .fx-rate { font-size: 20px; font-weight: 700; margin-top: 2px; }

    /* Sticky CTA */
    .sticky-cta {
      position: fixed;
      bottom: calc(80px + var(--safe-bottom));
      left: 16px; right: 16px;
      max-width: 448px;
      margin: 0 auto;
      z-index: 40;
    }
    .sticky-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%;
      min-height: 64px;
      background: var(--yellow);
      color: var(--black);
      border: 4px solid var(--black);
      box-shadow: 6px 6px 0 var(--black);
      font-family: "Fredoka", sans-serif;
      font-size: 20px;
      font-weight: 700;
    }
    .sticky-btn:active {
      transform: translateY(3px) translateX(3px);
      box-shadow: 3px 3px 0 var(--black);
    }

    /* Tab Bar */
    .tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(80px + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--white);
      border-top: 4px solid var(--black);
      display: flex;
      z-index: 30;
    }
    .tab-item {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px;
      color: var(--black);
      text-decoration: none;
      min-height: 48px;
      padding: 8px 4px;
      font-size: 11px;
      font-weight: 700;
    }
    .tab-item.active { background: var(--yellow); }
    .tab-icon { font-size: 24px; }
    .tab-fab {
      flex: 0 0 64px;
      position: relative;
    }
    .tab-fab .tab-circle {
      position: absolute;
      top: -20px; left: 50%; transform: translateX(-50%);
      width: 64px; height: 64px;
      background: var(--coral);
      color: var(--white);
      border: 4px solid var(--black);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 4px 4px 0 var(--black);
    }

    @media (min-width: 768px) {
      body { max-width: 480px; margin: 0 auto; border-left: 4px solid var(--black); border-right: 4px solid var(--black); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>🛒 SUPERMARKET<br>TRACKER</h1>
      <p>拍照 · 記帳 · 換算！</p>
      <div class="badge-row">
        <span class="badge">📸 拍照</span>
        <span class="badge coral">🛍️ 購物車</span>
        <span class="badge lavender">💱 匯率</span>
      </div>
    </div>

    <div class="total-card">
      <div class="total-label">💥 今日總計 💥</div>
      <div class="total-amount">$1,247</div>
      <div class="total-sub">≈ USD 39.69 · JPY 6,189</div>
    </div>

    <a href="#" class="capture-fab">
      <div class="icon">📷</div>
      <div class="text">
        <div class="t1">立即拍照</div>
        <div class="t2">對準商品 · 自動辨識</div>
      </div>
    </a>

    <div class="section">
      <h2><span class="section-emoji">🛒</span> 購物車 (4)</h2>
      <div class="cart-item">
        <div class="cart-emoji">🍎</div>
        <div class="item-info">
          <div class="item-name">蘋果</div>
          <div class="item-qty">3 顆</div>
        </div>
        <div class="item-right">
          <span class="price-sticker">$45</span>
          <button class="item-del" aria-label="刪除">×</button>
        </div>
      </div>
      <div class="cart-item">
        <div class="cart-emoji">🥛</div>
        <div class="item-info">
          <div class="item-name">鮮奶</div>
          <div class="item-qty">1 瓶</div>
        </div>
        <div class="item-right">
          <span class="price-sticker">$95</span>
          <button class="item-del" aria-label="刪除">×</button>
        </div>
      </div>
      <div class="cart-item">
        <div class="cart-emoji">🍞</div>
        <div class="item-info">
          <div class="item-name">吐司</div>
          <div class="item-qty">1 包</div>
        </div>
        <div class="item-right">
          <span class="price-sticker">$65</span>
          <button class="item-del" aria-label="刪除">×</button>
        </div>
      </div>
      <div class="cart-item">
        <div class="cart-emoji">🥑</div>
        <div class="item-info">
          <div class="item-name">酪梨</div>
          <div class="item-qty">2 顆</div>
        </div>
        <div class="item-right">
          <span class="price-sticker">$120</span>
          <button class="item-del" aria-label="刪除">×</button>
        </div>
      </div>
    </div>

    <div class="section">
      <h2><span class="section-emoji">💱</span> 匯率</h2>
      <div class="fx-grid">
        <div class="fx-cell">
          <div class="fx-pair">USD</div>
          <div class="fx-rate">31.42</div>
        </div>
        <div class="fx-cell">
          <div class="fx-pair">JPY</div>
          <div class="fx-rate">0.20</div>
        </div>
        <div class="fx-cell">
          <div class="fx-pair">EUR</div>
          <div class="fx-rate">34.18</div>
        </div>
        <div class="fx-cell">
          <div class="fx-pair">KRW</div>
          <div class="fx-rate">0.024</div>
        </div>
      </div>
    </div>

    <div class="sticky-cta">
      <button class="sticky-btn">💥 結帳 · $325</button>
    </div>
  </div>

  <nav class="tab-bar">
    <a href="#" class="tab-item active">
      <span class="tab-icon">🏠</span>
      <span>首頁</span>
    </a>
    <a href="#" class="tab-item">
      <span class="tab-icon">🛒</span>
      <span>購物車</span>
    </a>
    <a href="#" class="tab-item tab-fab">
      <span class="tab-circle">📸</span>
    </a>
    <a href="#" class="tab-item">
      <span class="tab-icon">💱</span>
      <span>匯率</span>
    </a>
    <a href="#" class="tab-item">
      <span class="tab-icon">📊</span>
      <span>統計</span>
    </a>
  </nav>

  <!-- 愛太妍 -->
</body>
</html>
