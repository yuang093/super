<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拜訪統計 — Supermarket Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', 'Fredoka', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #FFD93D;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: #16213e;
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      border: 1px solid #0f3460;
    }
    .card-value {
      font-size: 2.5rem;
      font-weight: 700;
      color: #FFD93D;
      margin-bottom: 4px;
    }
    .card-label {
      font-size: 0.9rem;
      color: #94a3b8;
    }
    .online-indicator {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .chart-section {
      background: #16213e;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid #0f3460;
    }
    .chart-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #e2e8f0;
    }
    .chart-container { position: relative; height: 280px; }
    .updated-at {
      text-align: center;
      color: #64748b;
      font-size: 0.8rem;
      margin-top: 16px;
    }
    .loading {
      text-align: center;
      color: #64748b;
      padding: 40px;
    }
    .error {
      text-align: center;
      color: #ef4444;
      padding: 40px;
      background: #16213e;
      border-radius: 16px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 20px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #FFD93D; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← 返回首頁</a>
    <h1>📊 拜訪統計</h1>

    <div class="cards">
      <div class="card">
        <div class="card-value" id="total-views">--</div>
        <div class="card-label">總拜訪次數</div>
      </div>
      <div class="card">
        <div class="card-value" id="today-views">--</div>
        <div class="card-label">今日拜訪</div>
      </div>
      <div class="card">
        <div class="card-value" id="total-visitors">--</div>
        <div class="card-label">總訪客數</div>
      </div>
      <div class="card">
        <div class="card-value" id="new-visitors">--</div>
        <div class="card-label">今日新訪客</div>
      </div>
      <div class="card">
        <div class="card-value" id="online">
          <span class="online-indicator"></span><span id="online-count">--</span>
        </div>
        <div class="card-label">目前在線</div>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-title">📈 24 小時流量</div>
      <div class="chart-container">
        <canvas id="hourlyChart"></canvas>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-title">📅 近 30 天流量</div>
      <div class="chart-container">
        <canvas id="dailyChart"></canvas>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-title">📱 設備類型分布（近 30 天）</div>
      <div class="chart-container" style="height: 200px;">
        <canvas id="deviceChart"></canvas>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-title">🌍 流量來源國家分布（近 30 天）</div>
      <div class="chart-container" style="height: 200px;">
        <canvas id="geoChart"></canvas>
      </div>
    </div>

    <div class="updated-at" id="updated-at">載入中...</div>
  </div>

  <script>
    // ========== 圖表設定 ==========
    const CHART_COLORS = {
      primary: '#FFD93D',
      secondary: '#4facfe',
      success: '#22c55e',
      bg: '#16213e',
      grid: '#0f3460',
      text: '#94a3b8',
    }

    Chart.defaults.color = CHART_COLORS.text
    Chart.defaults.borderColor = CHART_COLORS.grid

    let hourlyChart = null
    let dailyChart = null

    // ========== 載入資料 ==========
    async function loadStats() {
      try {
        const [summary, hourly, daily, now, devices, geo] = await Promise.all([
          fetch('/api/stats/summary').then(r => { if (!r.ok) throw new Error('summary failed'); return r.json() }),
          fetch('/api/stats/hourly').then(r => { if (!r.ok) throw new Error('hourly failed'); return r.json() }),
          fetch('/api/stats/daily').then(r => { if (!r.ok) throw new Error('daily failed'); return r.json() }),
          fetch('/api/stats/now').then(r => { if (!r.ok) throw new Error('now failed'); return r.json() }),
          fetch('/api/stats/devices').then(r => { if (!r.ok) throw new Error('devices failed'); return r.json() }),
          fetch('/api/stats/geo').then(r => { if (!r.ok) throw new Error('geo failed'); return r.json() }),
        ])

        // 更新卡片
        document.getElementById('total-views').textContent = formatNumber(summary.total_views)
        document.getElementById('today-views').textContent = formatNumber(summary.today_views)
        document.getElementById('total-visitors').textContent = formatNumber(summary.total_visitors)
        document.getElementById('new-visitors').textContent = formatNumber(summary.today_new_visitors)
        document.getElementById('online-count').textContent = now.online

        // 更新圖表
        updateHourlyChart(hourly.data)
        updateDailyChart(daily.data)
        updateDeviceChart(devices.total)
        updateGeoChart(geo.total, geo.unknown)

        // 更新時間
        const time = new Date(summary.updated_at).toLocaleString('zh-TW')
        document.getElementById('updated-at').textContent = `最後更新：${time}`
      } catch (err) {
        console.error('載入失敗:', err)
        document.getElementById('updated-at').textContent = '載入失敗：' + err.message + '（請按 Ctrl+Shift+R 強制刷新）'
      }
    }

    function formatNumber(n) {
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k'
      return n || 0
    }

    // ========== 24小時折線圖 ==========
    function updateHourlyChart(data) {
      const ctx = document.getElementById('hourlyChart').getContext('2d')
      const labels = data.map((_, i) => `${i}:00`)
      const values = data.map(d => d.count)

      if (window.hourlyChart && typeof window.hourlyChart.destroy === 'function') {
        window.hourlyChart.destroy()
      }

      window.hourlyChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: '拜訪次數',
            data: values,
            borderColor: CHART_COLORS.primary,
            backgroundColor: CHART_COLORS.primary + '33',
            fill: true,
            tension: 0.4,
            pointRadius: 3,
            pointHoverRadius: 6,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
          },
          scales: {
            x: {
              grid: { color: CHART_COLORS.grid },
              ticks: { maxTicksLimit: 12 },
            },
            y: {
              beginAtZero: true,
              grid: { color: CHART_COLORS.grid },
              ticks: { stepSize: 1 },
            },
          },
        },
      })
    }

    // ========== 30天柱狀圖 ==========
    function updateDailyChart(data) {
      const ctx = document.getElementById('dailyChart').getContext('2d')
      const labels = data.map(d => d.day.slice(5))  // MM-DD
      const values = data.map(d => d.count)

      if (window.dailyChart && typeof window.dailyChart.destroy === 'function') {
        window.dailyChart.destroy()
      }

      window.dailyChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: '拜訪次數',
            data: values,
            backgroundColor: CHART_COLORS.secondary + 'aa',
            borderColor: CHART_COLORS.secondary,
            borderWidth: 1,
            borderRadius: 6,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { maxTicksLimit: 15 },
            },
            y: {
              beginAtZero: true,
              grid: { color: CHART_COLORS.grid },
              ticks: { stepSize: 1 },
            },
          },
        },
      })
    }

    // ========== 設備類型圓餅圖 ==========
    function updateDeviceChart(data) {
      const ctx = document.getElementById('deviceChart').getContext('2d')

      const deviceLabels = {
        mobile: '📱 手機',
        desktop: '💻 桌面',
        tablet: '📲 平板',
        bot: '🤖 機器人',
        unknown: '❓ 未知',
      }

      const labels = data.map(d => deviceLabels[d.device_type] || d.device_type)
      const values = data.map(d => d.count)
      const colors = ['#4facfe', '#FFD93D', '#22c55e', '#a855f7', '#94a3b8']

      if (window.deviceChart && typeof window.deviceChart.destroy === 'function') {
        window.deviceChart.destroy()
      }

      window.deviceChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: colors.slice(0, data.length),
            borderWidth: 0,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'right',
              labels: { color: '#94a3b8', padding: 12 },
            },
          },
        },
      })
    }

    // ========== 國家分布柱狀圖 ==========
    function updateGeoChart(data, unknown) {
      const ctx = document.getElementById('geoChart').getContext('2d')

      const countryNames = {
        TW: '🇹🇼 台灣', US: '🇺🇸 美國', JP: '🇯🇵 日本', KR: '🇰🇷 韓國',
        HK: '🇭🇰 香港', SG: '🇸🇬 新加坡', GB: '🇬🇧 英國', DE: '🇩🇪 德國',
        FR: '🇫🇷 法國', AU: '🇦🇺 澳洲', CA: '🇨🇦 加拿大', CN: '🇨🇳 中國',
        IN: '🇮🇳 印度', TH: '🇹🇭 泰國', MY: '🇲🇾 馬來西亞', PH: '🇵🇭 菲律賓',
        VN: '🇻🇳 越南', ID: '🇮🇩 印尼', NZ: '🇳🇿 紐西蘭', UK: '🇬🇧 英國',
      }

      const labels = data.map(d => countryNames[d.country] || d.country)
      const values = data.map(d => d.count)

      if (window.geoChart && typeof window.geoChart.destroy === 'function') {
        window.geoChart.destroy()
      }

      window.geoChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels.slice(0, 10),
          datasets: [{
            label: '拜訪次數',
            data: values.slice(0, 10),
            backgroundColor: '#22c55eaa',
            borderColor: '#22c55e',
            borderWidth: 1,
            borderRadius: 4,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          indexAxis: 'y',
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#0f3460' }, ticks: { color: '#94a3b8' } },
            y: { grid: { display: false }, ticks: { color: '#94a3b8' } },
          },
        },
      })
    }

    // ========== 初始化 ==========
    loadStats()
    setInterval(loadStats, 30000)  // 每 30 秒自動更新
  </script>
</body>
</html>
